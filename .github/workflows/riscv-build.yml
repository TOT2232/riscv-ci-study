name: RISC-V Build and Emulation

on: 
  push:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu qemu-user

      - name: Compile for RISC-V
        run: |
          riscv64-linux-gnu-gcc hello_lpi4a.c -o hello_riscv
          echo "Build Complete!"

      - name: Run in Simulation
        run: |
          qemu-riscv64 -L /usr/riscv64-linux-gnu ./hello_riscv

      - name: Save Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: riscv-binary
          path: hello_riscv
